name: CI and Deploy to Hostinger

on:
  push:
    branches:
      - main
      - development
  pull_request:
    branches:
      - main
      - development

permissions:
  contents: read

concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    environment: Testing

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.4', '8.5']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Check versions
        run: |
          php -v
          composer --version
          node -v
          npm -v

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node Dependencies
        run: npm ci

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        run: ./vendor/bin/pest

  lint:
    name: Lint
    runs-on: ubuntu-latest
    environment: Testing

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Check versions
        run: |
          php -v
          composer --version
          node -v
          npm -v

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node Dependencies
        run: npm ci

      - name: Run Pint
        run: composer lint

  build:
    name: Build Production Assets
    runs-on: ubuntu-latest

    needs:
      - tests
      - lint

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Check versions
        run: |
          php -v
          composer --version
          node -v
          npm -v

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Composer Dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Install Node Dependencies
        run: npm ci

      - name: Build Frontend Assets
        run: npm run build

      - name: Compress Built Assets
        run: tar -czf public-build.tar.gz -C public build

      - name: Upload Build Archive
        uses: actions/upload-artifact@v6
        with:
          name: public-build-archive
          path: public-build.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest

    needs:
      - build

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download Build Archive
        uses: actions/download-artifact@v6
        with:
          name: public-build-archive

      - name: Upload Built Assets Archive to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          source: public-build.tar.gz
          target: ${{ secrets.HOSTINGER_PATH }}
          overwrite: true

      - name: Run Laravel Deploy Commands
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            set -e

            PHP="/opt/alt/php85/usr/bin/php"
            COMPOSER="$(which composer)"
            APP_DIR="${{ secrets.HOSTINGER_PATH }}"

            cd "$APP_DIR"

            echo "Using PHP:"
            $PHP -v

            echo "Using Composer:"
            $PHP $COMPOSER --version

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing Composer dependencies..."
            $PHP $COMPOSER install --no-dev --prefer-dist --optimize-autoloader --no-interaction

            echo "Replacing built frontend assets..."
            rm -rf public_html/build
            tar -xzf public-build.tar.gz -C public_html
            rm -f public-build.tar.gz

            echo "Running migrations..."
            $PHP artisan migrate --force

            echo "Clearing old cache..."
            $PHP artisan optimize:clear

            echo "Building production cache..."
            $PHP artisan config:cache
            $PHP artisan route:cache
            $PHP artisan view:cache

            echo "Deploy completed."